<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Interface</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* Asegúrate de que pro.png esté en la misma carpeta que este archivo */
            background-image: url('pro.png'); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 350px;
            /* Ajuste de posición según tu diseño */
            margin-top: 250px; 
        }

        .key-title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            height: 45px;
            background-color: white;
            border: none;
            border-radius: 25px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 20px;
            outline: none;
            color: black;
        }

        .btn-submit {
            width: 100%;
            height: 45px;
            background-color: #cccccc;
            border: 2px solid #888888;
            border-radius: 25px;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:active {
            background-color: #999999;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="key-title">KEY:</div>
        
        <input type="text" id="keyInput" class="input-box" autocomplete="off" placeholder="">
        
        <button onclick="validarAcceso()" class="btn-submit">Acceder</button>
    </div>

    <script>
        async function validarAcceso() {
            const keyInput = document.getElementById('keyInput');
            const key = keyInput.value;
            const btn = document.querySelector('.btn-submit');
            
            // URL de tu túnel Cloudflared
            const CLOUDFLARE_URL = "https://suit-married-dramatically-industrial.trycloudflare.com/validate";

            if (!key) {
                alert("Por favor, ingresa una KEY.");
                return;
            }

            try {
                btn.innerText = "Verificando...";
                btn.disabled = true;
                
                const response = await fetch(CLOUDFLARE_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ key: key })
                });

                const result = await response.json();

                if (response.status === 200) {
                    // Si el servidor envía una ruta de redirección
                    if (result.redirect) {
                        window.location.href = "https://suit-married-dramatically-industrial.trycloudflare.com" + result.redirect;
                    } else {
                        alert("ACCESO GARANTIZADO");
                    }
                    keyInput.value = ""; 
                } else {
                    alert("KEY INVÁLIDA");
                    keyInput.value = ""; 
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                alert("Error: No se pudo conectar con el servidor de Cloudflare.");
            } finally {
                btn.innerText = "Acceder";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
